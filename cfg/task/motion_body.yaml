# @package task
project: track
name: Motion_Body

viewer:
  resolution: [1280, 720]
  lookat: [0., 0., 0.]
  eye: [2.0, 2.0, 1.0]

robot: 
  name: g1_waist_unlocked
terrain: plane

num_envs: 4096
max_episode_length: 10000

sim:
  step_dt: 0.02
  isaac_physics_dt: 0.005
  mujoco_physics_dt: 0.002

input:
  action:
    class: JointPosition
    action_scaling:
      .*hip_pitch.*: 0.548
      .*hip_roll.*: 0.351
      .*hip_yaw.*: 0.548
      .*knee.*: 0.351
      waist_yaw_joint: 0.548
      waist_roll_joint: 0.439
      waist_pitch_joint: 0.439
      .*ankle.*: 0.439
      .*shoulder.*: 0.173
      .*elbow_joint: 0.173
      # .*wrist_roll.*: 0.173
      # .*wrist_pitch.*: 0.293
      # .*wrist_yaw.*: 0.293
    max_delay: 2
    alpha_range: [0.8, 1.0]

command:
  class: MotionLibG1
  dataset: [sfu_29dof, lafan1]
  occlusion: "amass_copycat_occlusion_v3.pkl"

observation:
  policy:
    root_angvel_b:        {noise_std: 0.2}
    gravity_multistep:    {steps: 1, noise_std: 0.05}
    joint_pos_multistep:  {joint_names: "(?!.*(wrist)).*", steps: 1, noise_std: 0.05}
    joint_vel_multistep:  {joint_names: "(?!.*(wrist)).*", steps: 1, noise_std: 0.5}
    prev_actions:         {steps: 1}
    ref_root_quat:        {}
    ref_body_pos_local:   {body_names: 
                              [
                                left_hip_pitch_link, right_hip_pitch_link, 
                                left_knee_link, right_knee_link, 
                                left_ankle_roll_link, right_ankle_roll_link, 
                                left_shoulder_roll_link, right_shoulder_roll_link, 
                                left_elbow_link, right_elbow_link, 
                                left_wrist_yaw_link, right_wrist_yaw_link
                              ]
                          }
    ref_linvel_b:         {}
    ref_angvel_b:         {}
  priv:
    root_linvel_b:        {}
    root_angvel_b:        {noise_std: 0.0}
    gravity_multistep:    {steps: 1, noise_std: 0.0}
    joint_pos_multistep:  {joint_names: "(?!.*(wrist)).*", steps: 1, noise_std: 0.0}
    joint_vel_multistep:  {joint_names: "(?!.*(wrist)).*", steps: 1, noise_std: 0.0}
    prev_actions:         {steps: 1}
    ref_qpos:             {}
    ref_qvel:             {}
    ref_linvel_b:         {}
    ref_angvel_b:         {}
    ref_kp_pos_gap:       {}
    ref_kp_quat_gap:      {}
    body_pos_b:           {body_names: [left_hip_pitch_link, right_hip_pitch_link, 
                                        left_knee_link, right_knee_link, 
                                        left_ankle_roll_link, right_ankle_roll_link, 
                                        left_shoulder_roll_link, right_shoulder_roll_link, 
                                        left_elbow_link, right_elbow_link, 
                                        left_wrist_yaw_link, right_wrist_yaw_link],
                                        yaw_only: false}
    body_ori_b:           {body_names: [left_hip_pitch_link, right_hip_pitch_link, 
                                        left_knee_link, right_knee_link, 
                                        left_ankle_roll_link, right_ankle_roll_link, 
                                        left_shoulder_roll_link, right_shoulder_roll_link, 
                                        left_elbow_link, right_elbow_link, 
                                        left_wrist_yaw_link, right_wrist_yaw_link],
                                        yaw_only: false}

reward:
  loco:
    tracking_anchor_pos:    {weight: 1.0}
    tracking_anchor_quat:   {weight: 1.0}
    tracking_kp_pos:        {weight: 2.0}
    tracking_kp_quat:       {weight: 2.0}
    tracking_kp_lin_vel:    {weight: 2.0}
    tracking_kp_ang_vel:    {weight: 2.0}

    action_rate_l2:         {weight: 0.2}
    joint_limits:           {weight: 10.0, joint_names: "(?!.*(wrist)).*", offset: 0.0}

randomization:
  perturb_body_com:
    body_names: ["torso_link"]
    pos_range: [-0.1, 0.1]
  push_by_setting_velocity:
    velocity_range: [-5.0, 5.0]
  perturb_body_mass:
    ".*wrist_yaw_link": [1.0, 2.0]
    "^(?!.*wrist_yaw_link).*": [0.9, 1.1]
    # .*: [0.9, 1.1]
  perturb_body_materials:
    body_names: ".*ankle_roll_link"
    static_friction_range: [0.2, 1.6]
    dynamic_friction_range: [0.2, 1.2]
    restitution_range: [0.0, 0.5]
  motor_params:
    stiffness_range:
      .*: [0.8, 1.1]
    damping_range:
      .*: [0.8, 1.1]

termination:
  success: {}
  # root_deviation:       {max_distance: 0.4}
  root_z_deviation:     {threshold: 0.25}
  root_rot_deviation:   {threshold: 0.8}
  track_kp_z_error:     {threshold: 0.25, 
                        body_names: [ left_wrist_yaw_link, right_wrist_yaw_link,
                                      left_ankle_roll_link, right_ankle_roll_link]}
